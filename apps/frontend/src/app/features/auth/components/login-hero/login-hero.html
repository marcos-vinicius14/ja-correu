<div class="hero">
  <!-- Gradient divider top -->
  <div class="hero__gradient hero__gradient--top"></div>

  <div class="hero__inner">
    <div class="hero__top">
      <!-- Logo -->
      <header class="hero__logo">Ja Correu?</header>

      <!-- Feature pills -->
      <ul class="hero__pills" aria-label="Funcionalidades">
        <li class="hero__pill">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
          </svg>
          Planos semanais automáticos
        </li>
        <li class="hero__pill">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="20" x2="18" y2="10" />
            <line x1="12" y1="20" x2="12" y2="4" />
            <line x1="6" y1="20" x2="6" y2="14" />
          </svg>
          Análise do Strava em tempo real
        </li>
        <li class="hero__pill">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          Periodização inteligente por fase
        </li>
      </ul>
    </div>

    <!-- Headline + subtitle -->
    <div class="hero__content">
      <h2 class="hero__headline">
        Seu treino.<br />
        Adaptado.<br />
        Toda semana.
      </h2>
      <p class="hero__subtitle">IA que aprende com seu desempenho real no Strava.</p>
    </div>

    <!-- Stats row -->
    <div class="hero__stats">
      <div class="hero__stat">
        <span class="hero__stat-value hero__stat-value--orange">12.847</span>
        <span class="hero__stat-label">Planos gerados</span>
      </div>
      <div class="hero__stat">
        <span class="hero__stat-value hero__stat-value--green">2.4M</span>
        <span class="hero__stat-label">Km monitorados</span>
      </div>
      <div class="hero__stat">
        <span class="hero__stat-value hero__stat-value--orange">3.201</span>
        <span class="hero__stat-label">Atletas ativos</span>
      </div>
    </div>
  </div>

  <!-- Sparkline SVG decorativo (bottom-right) -->
  <div class="hero__sparkline" aria-hidden="true">
    <svg width="280" height="120" viewBox="0 0 280 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polyline points="0,60 40,40 80,70 120,20 160,50 200,30 240,55 280,10" stroke="#FF5C00" stroke-width="2"
        fill="none" />
      <polyline points="0,80 40,60 80,85 120,45 160,68 200,50 240,72 280,35" stroke="#C6F135" stroke-width="1.5"
        fill="none" />
    </svg>
  </div>

  <!-- Gradient divider bottom -->
  <div class="hero__gradient hero__gradient--bottom"></div>
</div>
