server:
  forward-headers-strategy: framework

spring:
  application:
    name: ja-correu

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DATABASE_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}



  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    encoding: UTF-8

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      embedding:
        options:
          model: text-embedding-3-small

      chat:
        options:
          model: gpt-4o
          max-tokens: 4096
          temperature: 0.7

    vectorstore:
      pgvector:
        initialize-schema: false
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536

jwt:
  secret: ${JWT_SECRET}
  refresh:
    expiration: 604800

logging:
  level:
    io.micrometer: DEBUG
    io.opentelemetry: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, conditions
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
  tracing:
    sampling:
      probability: 1.0
    observation:
      enabled: true



